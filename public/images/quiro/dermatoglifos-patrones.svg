<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" style="background:#0A0A0F">
  <!-- Title -->
  <text x="300" y="25" fill="#C9A84C" font-size="14" font-family="Georgia" text-anchor="middle" font-weight="bold">Los 3 Patrones Dermatoglíficos</text>

  <!-- ARCH (5%) -->
  <g transform="translate(100,120)">
    <circle cx="0" cy="0" r="55" fill="#12121A" stroke="#333" stroke-width="1"/>
    <!-- Arch pattern lines -->
    <path d="M-35,15 C-20,10 -5,8 0,7 C5,8 20,10 35,15" fill="none" stroke="#FF6B6B" stroke-width="1.2" opacity="0.6"/>
    <path d="M-38,10 C-20,3 -5,-2 0,-3 C5,-2 20,3 38,10" fill="none" stroke="#FF6B6B" stroke-width="1.2" opacity="0.7"/>
    <path d="M-40,5 C-20,-5 -5,-10 0,-12 C5,-10 20,-5 40,5" fill="none" stroke="#FF6B6B" stroke-width="1.2" opacity="0.8"/>
    <path d="M-38,0 C-20,-12 -5,-18 0,-20 C5,-18 20,-12 38,0" fill="none" stroke="#FF6B6B" stroke-width="1.3" opacity="0.9"/>
    <path d="M-35,-5 C-20,-18 -5,-25 0,-28 C5,-25 20,-18 35,-5" fill="none" stroke="#FF6B6B" stroke-width="1.3"/>
    <path d="M-40,20 L40,20" stroke="#FF6B6B" stroke-width="1" opacity="0.4"/>
    <path d="M-42,25 L42,25" stroke="#FF6B6B" stroke-width="1" opacity="0.3"/>
    <text x="0" y="50" fill="#FF6B6B" font-size="13" font-family="Georgia" text-anchor="middle" font-weight="bold">ARCO</text>
    <text x="0" y="65" fill="#FF6B6B" font-size="10" font-family="sans-serif" text-anchor="middle" opacity="0.7">~5%</text>
    <text x="0" y="80" fill="#F0EDE4" font-size="8" font-family="sans-serif" text-anchor="middle" opacity="0.5">Práctico · Reservado</text>
  </g>

  <!-- LOOP (60-65%) -->
  <g transform="translate(300,120)">
    <circle cx="0" cy="0" r="55" fill="#12121A" stroke="#333" stroke-width="1"/>
    <!-- Loop pattern lines -->
    <path d="M30,20 C25,10 15,-5 5,-15 C-5,-22 -15,-20 -20,-12 C-25,-4 -22,8 -15,15 C-8,22 5,25 15,20" fill="none" stroke="#00D68F" stroke-width="1.3"/>
    <path d="M32,15 C28,5 18,-8 8,-18 C-2,-25 -12,-23 -18,-15 C-24,-5 -20,10 -12,18 C-4,25 8,28 18,22" fill="none" stroke="#00D68F" stroke-width="1.2" opacity="0.8"/>
    <path d="M34,10 C30,0 22,-12 10,-22 C0,-28 -10,-26 -15,-18 C-22,-8 -18,12 -8,22 C0,28 12,30 22,24" fill="none" stroke="#00D68F" stroke-width="1.1" opacity="0.6"/>
    <path d="M-40,25 L40,25" stroke="#00D68F" stroke-width="1" opacity="0.3"/>
    <path d="M-42,30 L42,30" stroke="#00D68F" stroke-width="1" opacity="0.2"/>
    <text x="0" y="50" fill="#00D68F" font-size="13" font-family="Georgia" text-anchor="middle" font-weight="bold">BUCLE</text>
    <text x="0" y="65" fill="#00D68F" font-size="10" font-family="sans-serif" text-anchor="middle" opacity="0.7">~60-65%</text>
    <text x="0" y="80" fill="#F0EDE4" font-size="8" font-family="sans-serif" text-anchor="middle" opacity="0.5">Adaptable · Sociable</text>
  </g>

  <!-- WHORL (30-35%) -->
  <g transform="translate(500,120)">
    <circle cx="0" cy="0" r="55" fill="#12121A" stroke="#333" stroke-width="1"/>
    <!-- Whorl pattern - concentric spirals -->
    <circle cx="0" cy="-2" r="5" fill="none" stroke="#C9A84C" stroke-width="1.3"/>
    <circle cx="0" cy="-2" r="10" fill="none" stroke="#C9A84C" stroke-width="1.2" opacity="0.9"/>
    <circle cx="0" cy="-2" r="16" fill="none" stroke="#C9A84C" stroke-width="1.1" opacity="0.8"/>
    <circle cx="0" cy="-2" r="22" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.7"/>
    <circle cx="0" cy="-2" r="28" fill="none" stroke="#C9A84C" stroke-width="0.9" opacity="0.5"/>
    <circle cx="0" cy="-2" r="34" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.3"/>
    <text x="0" y="50" fill="#C9A84C" font-size="13" font-family="Georgia" text-anchor="middle" font-weight="bold">VERTICILO</text>
    <text x="0" y="65" fill="#C9A84C" font-size="10" font-family="sans-serif" text-anchor="middle" opacity="0.7">~30-35%</text>
    <text x="0" y="80" fill="#F0EDE4" font-size="8" font-family="sans-serif" text-anchor="middle" opacity="0.5">Individual · Determinado</text>
  </g>
</svg>
