<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" style="background:#0A0A0F">
  <text x="250" y="22" fill="#C9A84C" font-size="14" font-family="Georgia" text-anchor="middle" font-weight="bold">Análisis de Dedos</text>

  <!-- Hand outline simplified -->
  <path d="M250,380 C180,380 120,340 110,280 L105,220 C102,190 108,160 120,140 L130,120" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
  <path d="M250,380 C320,380 380,340 390,280 L395,220 C398,190 392,160 380,140 L370,120" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>

  <!-- THUMB (leftmost) -->
  <g transform="translate(110,220)">
    <rect x="-12" y="-80" width="24" height="80" rx="10" fill="none" stroke="#FF9F43" stroke-width="2"/>
    <!-- Phalanges -->
    <line x1="-12" y1="-40" x2="12" y2="-40" stroke="#FF9F43" stroke-width="0.8" stroke-dasharray="3,2"/>
    <text x="30" y="-58" fill="#FF9F43" font-size="8" font-family="sans-serif" opacity="0.8">Voluntad</text>
    <text x="30" y="-20" fill="#FF9F43" font-size="8" font-family="sans-serif" opacity="0.8">Lógica</text>
    <text x="0" y="15" fill="#FF9F43" font-size="10" font-family="Georgia" text-anchor="middle" font-weight="bold">Pulgar</text>
    <text x="0" y="28" fill="#FF9F43" font-size="7" font-family="sans-serif" text-anchor="middle" opacity="0.6">Voluntad</text>
  </g>

  <!-- INDEX (Jupiter) -->
  <g transform="translate(190,180)">
    <rect x="-12" y="-110" width="24" height="110" rx="10" fill="none" stroke="#FF6B6B" stroke-width="2"/>
    <line x1="-12" y1="-73" x2="12" y2="-73" stroke="#FF6B6B" stroke-width="0.8" stroke-dasharray="3,2"/>
    <line x1="-12" y1="-37" x2="12" y2="-37" stroke="#FF6B6B" stroke-width="0.8" stroke-dasharray="3,2"/>
    <text x="22" y="-88" fill="#F0EDE4" font-size="7" font-family="sans-serif" opacity="0.6">Espiritual</text>
    <text x="22" y="-52" fill="#F0EDE4" font-size="7" font-family="sans-serif" opacity="0.6">Práctica</text>
    <text x="22" y="-15" fill="#F0EDE4" font-size="7" font-family="sans-serif" opacity="0.6">Material</text>
    <text x="0" y="15" fill="#FF6B6B" font-size="10" font-family="Georgia" text-anchor="middle" font-weight="bold">Índice</text>
    <text x="0" y="28" fill="#FF6B6B" font-size="7" font-family="sans-serif" text-anchor="middle" opacity="0.6">♃ Júpiter · Ambición</text>
  </g>

  <!-- MIDDLE (Saturn) -->
  <g transform="translate(250,170)">
    <rect x="-12" y="-125" width="24" height="125" rx="10" fill="none" stroke="#6B8FC5" stroke-width="2"/>
    <line x1="-12" y1="-83" x2="12" y2="-83" stroke="#6B8FC5" stroke-width="0.8" stroke-dasharray="3,2"/>
    <line x1="-12" y1="-42" x2="12" y2="-42" stroke="#6B8FC5" stroke-width="0.8" stroke-dasharray="3,2"/>
    <text x="0" y="15" fill="#6B8FC5" font-size="10" font-family="Georgia" text-anchor="middle" font-weight="bold">Medio</text>
    <text x="0" y="28" fill="#6B8FC5" font-size="7" font-family="sans-serif" text-anchor="middle" opacity="0.6">♄ Saturno · Responsabilidad</text>
  </g>

  <!-- RING (Apollo) -->
  <g transform="translate(310,175)">
    <rect x="-12" y="-115" width="24" height="115" rx="10" fill="none" stroke="#C9A84C" stroke-width="2"/>
    <line x1="-12" y1="-77" x2="12" y2="-77" stroke="#C9A84C" stroke-width="0.8" stroke-dasharray="3,2"/>
    <line x1="-12" y1="-38" x2="12" y2="-38" stroke="#C9A84C" stroke-width="0.8" stroke-dasharray="3,2"/>
    <text x="0" y="15" fill="#C9A84C" font-size="10" font-family="Georgia" text-anchor="middle" font-weight="bold">Anular</text>
    <text x="0" y="28" fill="#C9A84C" font-size="7" font-family="sans-serif" text-anchor="middle" opacity="0.6">☉ Apolo · Creatividad</text>
  </g>

  <!-- PINKY (Mercury) -->
  <g transform="translate(365,190)">
    <rect x="-12" y="-95" width="24" height="95" rx="10" fill="none" stroke="#BB86FC" stroke-width="2"/>
    <line x1="-12" y1="-63" x2="12" y2="-63" stroke="#BB86FC" stroke-width="0.8" stroke-dasharray="3,2"/>
    <line x1="-12" y1="-32" x2="12" y2="-32" stroke="#BB86FC" stroke-width="0.8" stroke-dasharray="3,2"/>
    <text x="0" y="15" fill="#BB86FC" font-size="10" font-family="Georgia" text-anchor="middle" font-weight="bold">Meñique</text>
    <text x="0" y="28" fill="#BB86FC" font-size="7" font-family="sans-serif" text-anchor="middle" opacity="0.6">☿ Mercurio · Comunicación</text>
  </g>

  <!-- Phalange legend -->
  <rect x="30" y="330" width="440" height="55" rx="8" fill="#12121A" stroke="#333" stroke-width="0.5"/>
  <text x="250" y="350" fill="#C9A84C" font-size="10" font-family="Georgia" text-anchor="middle" font-weight="bold">Las 3 falanges</text>
  <text x="250" y="368" fill="#F0EDE4" font-size="9" font-family="sans-serif" text-anchor="middle" opacity="0.6">Superior = mental/espiritual · Media = práctica · Inferior = material/instintiva</text>
</svg>
